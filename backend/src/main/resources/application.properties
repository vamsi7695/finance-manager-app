# Application Configuration
spring.application.name=finance-manager

# Server
server.port=8080

# Database (H2 for development - switch to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:13405188570-7009m6mgetv6fo63pigb07je5s9vde2r.apps.googleusercontent.com}

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-min-256-bits}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Encryption
app.encryption.server-key=${ENCRYPTION_SERVER_KEY:fm-auto-encrypt-server-key-change-in-production-2024}

