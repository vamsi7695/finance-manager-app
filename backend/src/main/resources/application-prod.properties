# Production Configuration (Render)
spring.application.name=finance-manager

server.port=${PORT:8080}

# PostgreSQL (provided by Render)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:financedb}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS - update with your Vercel domain
app.cors.allowed-origins=${CORS_ORIGINS:https://your-app.vercel.app}

# Encryption
app.encryption.server-key=${ENCRYPTION_SERVER_KEY}

# Disable H2 console in production
spring.h2.console.enabled=false
