services:
  - type: web
    name: finance-manager-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_SERVER_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: finance-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: finance-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: finance-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: finance-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: finance-db
          property: password
    healthCheckPath: /api/auth/health
    plan: free

databases:
  - name: finance-db
    plan: free
    databaseName: financedb
